<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <!-- Background circle -->
  <circle cx="250" cy="250" r="220" fill="none" stroke="#e0e0e0" stroke-width="2"/>
  <circle cx="250" cy="250" r="80" fill="#f0f4ff" stroke="#4a6fa5" stroke-width="2"/>
  <text x="250" y="245" text-anchor="middle" font-size="15" font-weight="bold" fill="#2c3e50">Thinking</text>
  <text x="250" y="265" text-anchor="middle" font-size="15" font-weight="bold" fill="#2c3e50">Partner</text>

  <!-- Move 1: Expand Options (top) -->
  <line x1="250" y1="170" x2="250" y2="65" stroke="#4a6fa5" stroke-width="2"/>
  <circle cx="250" cy="50" r="42" fill="#4a6fa5"/>
  <text x="250" y="44" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Expand</text>
  <text x="250" y="60" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Options</text>

  <!-- Move 2: Challenge (top-right) -->
  <line x1="312" y1="198" x2="392" y2="130" stroke="#e07b39" stroke-width="2"/>
  <circle cx="405" cy="118" r="42" fill="#e07b39"/>
  <text x="405" y="115" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Challenge</text>

  <!-- Move 3: Surface Assumptions (bottom-right) -->
  <line x1="318" y1="290" x2="410" y2="355" stroke="#5ba55b" stroke-width="2"/>
  <circle cx="420" cy="370" r="42" fill="#5ba55b"/>
  <text x="420" y="364" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Surface</text>
  <text x="420" y="380" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Assumptions</text>

  <!-- Move 4: Pre-mortem (bottom-left) -->
  <line x1="182" y1="290" x2="90" y2="355" stroke="#c0392b" stroke-width="2"/>
  <circle cx="80" cy="370" r="42" fill="#c0392b"/>
  <text x="80" y="364" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Pre-</text>
  <text x="80" y="380" text-anchor="middle" font-size="11" font-weight="bold" fill="white">mortem</text>

  <!-- Move 5: Reframe (top-left) -->
  <line x1="188" y1="198" x2="108" y2="130" stroke="#8e44ad" stroke-width="2"/>
  <circle cx="95" cy="118" r="42" fill="#8e44ad"/>
  <text x="95" y="115" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Reframe</text>
</svg>