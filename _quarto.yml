project:
  type: book
  output-dir: docs
  resources:
    - CNAME
    - .nojekyll
    - data/superstore.csv
    - data/chinook.db
    - data/company-handbook.md
    - code/**

number-depth: 2

book:
  title: "From BI to AI"
  subtitle: "Data-Driven Decision Making with Agentic AI"
  author: "Kerry Back"
  date: today
  reader-mode: true
  repo-url: "https://github.com/kerryback/bi-to-ai/tree/master/code"
  chapters:
    - index.qmd
    - 01-coding-tools.qmd
    - 02-exploring-data.qmd
    - 03-thinking-partner.qmd
    - 04-connecting-databases.qmd
    - 05-reporting-cycles.qmd
    - 06-rag.qmd
    - 07-reliability.qmd

format:
  html:
    footnotes-hover: true
    number-sections: true
    theme:
      light: flatly
      dark: superhero
    toc: true
    toc-depth: 3
    toc-title: Chapter contents
    code-fold: true
    code-block-bg: true
    code-block-border-left: "#31BAE9"
    code-overflow: wrap

comments:
  hypothesis: true
