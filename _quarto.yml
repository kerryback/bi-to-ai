project:
  type: book
  output-dir: docs
  resources:
    - CNAME
    - .nojekyll
    - files/data/superstore.csv
    - files/data/chinook.db
    - files/data/company-handbook.md
    - files/**
    - install/**

number-depth: 2

book:
  title: "From BI to AI"
  subtitle: "Data-Driven Decision Making with Agentic AI"
  author: "Kerry Back"
  date: today
  reader-mode: true
  repo-url: "https://github.com/kerryback/bi-to-ai/tree/master/files"
  chapters:
    - index.qmd
    - part: "Part I: From BI to AI"
      chapters:
        - 01-agents.qmd
        - 02-exploring-data.qmd
        - 03-thinking-partner.qmd
        - 04-connecting-databases.qmd
        - 05-reporting-pipelines.qmd
        - 06-reliability.qmd
    - part: "Part II: Beyond BI"
      chapters:
        - 07-agent-workflows.qmd
        - 08-rag.qmd
  appendices:
    - appendix-alternatives.qmd

format:
  html:
    footnotes-hover: true
    number-sections: true
    theme:
      light: flatly
      dark:
        - superhero
        - custom-dark.css
    toc: true
    toc-depth: 3
    toc-title: Module contents
    code-fold: true
    code-block-bg: true
    code-block-border-left: "#31BAE9"
    code-overflow: wrap

comments:
  hypothesis: true
