project:
  type: book
  output-dir: docs
  resources:
    - CNAME
    - .nojekyll
    - files/data/superstore.csv
    - files/data/chinook.db
    - files/data/company-handbook.md
    - files/**
    - install/**

number-depth: 2

book:
  title: "From BI to AI"
  subtitle: "Data-Driven Decision Making with Agentic AI"
  author: "Kerry Back"
  date: today
  reader-mode: true
  repo-url: "https://github.com/kerryback/bi-to-ai/tree/master/files"
  chapters:
    - index.qmd
    - 01-agents-and-dashboards.qmd
    - 02-getting-started.qmd
    - 03-exploring-data.qmd
    - 04-thinking-partner.qmd
    - 05-connecting-databases.qmd
    - 06-reporting-pipelines.qmd
    - 07-rag.qmd
    - 08-reliability.qmd

format:
  html:
    footnotes-hover: true
    number-sections: true
    theme:
      light: flatly
      dark:
        - superhero
        - custom-dark.css
    toc: true
    toc-depth: 3
    toc-title: Chapter contents
    code-fold: true
    code-block-bg: true
    code-block-border-left: "#31BAE9"
    code-overflow: wrap

comments:
  hypothesis: true
